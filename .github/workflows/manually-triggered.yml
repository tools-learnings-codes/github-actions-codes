name: Manually Triggered
on: 
    workflow_dispatch: 
        # values for these inputs gonna be passed while running this workflow 
        # by using GUI also you can pass and by using CLI also - and for pass the inputs you can use -f inputName=value 
        inputs: 
            name: 
                description: name of the owner
                type: string
                required: true 
                default: "owner"

            location: 
                description: his/her location
                type: choice 
                default: "Delhi"
                required: true 
                options: 
                    - Mumbai
                    - Bangalore
                    - Nagpur
                    - oddisha
                    - Delhi
                    - sikkim

            environment: 
                required : true 
jobs: 
    shell-commands: 
        runs-on: ubuntu-latest
        steps: 
            - run: echo "this is running after manually clicked"
            - name: printing the ref name
              run: echo $GITHUB_REF
            - name: accessing the value of inputs 
              run: | 
                echo "Name: ${{ inputs.name }}"
                echo "Location: ${{ inputs.location }}"