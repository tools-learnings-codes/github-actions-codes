name: workflow Commands 
on: [push]
jobs: 
    running-wf-commands: 
        runs-on: ubuntu-latest
        steps: 
            # to return a error in your workflow 
            - run: echo "::error file=app.js line1::Missing semicolon"
            - run: echo "::warning::This is a warning"
            - run: echo "::message::this is a message generated by WF"
        
            - run: |
                echo "::group::ERROR statements"
                echo "this is the second line of error"
                echo "third line of error"
                echo "fourth line of error"
                echo "::add-mask::{Himanshu}"    # this himanshu will be converted to *** 
                echo "::endgroup::" 
                