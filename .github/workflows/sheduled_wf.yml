name: Scheduled-wf
on: 
    schedule:
        - cron: "0 14 * * *"     # runs everyday at 2pm 
        - cron: "0/5 * * * *"   # for testing 
    workflow_dispatch:
jobs: 
    stale: 
        runs-on: ubuntu-latest 
        steps: 
            - uses: actions/stale@v8 
              with: 
                stale-issue-message: "This is some message generated from stale actions for checking"
                days-before-stale: 1 
                days-before-close: 5
            

