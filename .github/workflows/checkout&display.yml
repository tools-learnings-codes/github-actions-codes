## copying code from github into runner 
name: checkout & display
on: 
    push: 
    pull_request: 
        types: [opened , assigned , reopened , synchronize]    # activity types    # will trigger only when any of these event will occur 
    issues: 
        types: [opened , closed , reopened , assigned , unassigned] 
jobs: 
    checkout-display-files: 
        runs-on: ubuntu-latest 
        steps: 
            # - name: Checkout code
            #   run: | 
            #     git init 
            #     git remote add origin "https://$GITHUB_ACTOR:${{ secrets.GITHUB_TOKEN }}@github.com/$GITHUB_REPOSITORY.git"
            #     git fetch origin 
            #     git checkout main
            - name: checkout using actions 
              uses: actions/checkout@v7
            - name: Listing files
              run: ls -a 

    greeting-job: 
        runs-on: ubuntu-latest 
        needs: 
            - checkout-display-files
        steps: 
            - name: Simple js greet action
              id: greet                                               # giving a unique id to identify it for further steps
              uses: actions/hello-world-javascript-action@main
              with: 
                who-to-greet: Himanshu

            - name: output from greet step
              run: echo "${{ steps.greet.outputs.time }}"


    # calling another workflow here in this workflow : remember that workflow should have workflow_call inside itself 

    calling-workflow: 
        if: github.event_name == 'push'
        needs: 
            - greeting-job 
        uses: ./.github/workflows/connecting-workflow.yml 
