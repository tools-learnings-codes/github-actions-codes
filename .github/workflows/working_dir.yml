name: working_dir workflow
on: [push]
jobs: 
    working-dir-info: 
        runs-on: ubuntu-latest
        steps: 
            - run: |
                pwd 
                sudo apt install tree 
                tree 
                echo $GITHUB_SHA
                echo $GITHUB_REPOSITORY
                echo $GITHUB_WORKSPACE
    
    
            
    working-dir-info-windows: 
        runs-on: windows-latest
        defaults: 
            run:
                shell: pwsh
        steps: 
            - run: |
                pwd 
                dir /a
                echo $env:GITHUB_SHA
                echo $env:GITHUB_REPOSITORY
                echo $env:GITHUB_WORKSPACE